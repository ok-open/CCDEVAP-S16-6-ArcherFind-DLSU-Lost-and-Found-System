<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherFind - Manage Account</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/student_manage-account.css">
    <script src="navbar.js" defer></script>
    <script src="login.js" defer></script>
</head>

<body>
    <header>
        <div class="archerfind-logo">
            <h1>ArcherFind</h1>
            <img src="LOGOS/AF-ORIGINAL.png" alt="">
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="student_home.html">Home</a></li>
                <li><a href="student_about.html">About</a></li>

                <li class="dropdown">
                    <a href="#">Lost and Found</a>
                    <ul class="dropdown-menu">
                        <li><a href="students_item-view.html">Find Your Item</a></li>
                        <li><a href="students_surrender-form.html">Report Found Item</a></li>
                    </ul>
                </li>

                <li><a href="#">Contact Us</a></li>

                <li>
                    <button type="button" id="user-button">
                        <img src="LOGOS/user-icon.png" height="30px" alt="User" class="user-icon">
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <!-- ACCOUNT PAGE -->
    <div class="account-wrapper">
        <section class="account-layout">
            <!-- IMAGE -->
            <div class="profile-image">
                <span>IMAGE</span>
            </div>

            <!-- FORM -->
            <div class="account-form">

                <h2>Manage Account</h2>

                <!-- FIRST & LAST NAME -->
                <div class="row two-cols">
                    <div class="form-group">
                        <label>First Name <span class="tag">READ ONLY</span></label>
                        <input type="text" value="John" readonly>
                    </div>

                    <div class="form-group">
                        <label>Last Name <span class="tag">READ ONLY</span></label>
                        <input type="text" value="Doe" readonly>
                    </div>
                </div>

                <!-- EMAIL -->
                <div class="form-group full">
                    <label>Email <span class="tag">READ ONLY</span></label>
                    <input type="email" value="john.doe@dlsu.edu.ph" readonly>
                </div>

                <!-- CURRENT PASSWORD -->
                <div class="form-group full">
                    <label>Current Password</label>
                    <input type="password" id="current-pass" placeholder="Enter current password">

                    <div class="see-pass">
                        <input type="checkbox" onclick="toggleAccountPassword('current-pass')">
                        Show password
                    </div>
                </div>

                <!-- NEW PASSWORD -->
                <div class="form-group full">
                    <label>New Password</label>
                    <input type="password" id="new-pass" placeholder="Enter new password">

                    <div class="see-pass">
                        <input type="checkbox" onclick="toggleAccountPassword('new-pass')">
                        Show password
                    </div>
                </div>

                <!-- BUTTONS -->
                <div class="button-stack">
                    <button class="save-btn">Confirm New Password</button>
                    <button class="disable-btn">Disable Account</button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
