<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherFind - Manage Students</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/navbar-admin.css">
    <link rel="stylesheet" href="styles/admin_manage-student.css">
    <script src="navbar.js" defer></script>

</head>

<body>
    <!-- NAVBAR AND SIDEBAR -->
    <div id="navbar-placeholder"></div>
    
    <div class="itemview-wrapper">
        <aside class="itemview-sidebar">
            <div class="stats-box">
                <h3>Total Students</h3>
                <h2>3</h2>
            </div>
        </aside>

        <main class="itemview-main">
            <h1 class="manage-title">MANAGE STUDENTS</h1>

            <div class="itemview-controls">
                <input type="text" placeholder="Search for student..." class="search-bar">

                <select class="sort-dropdown">
                    <option>Sort: Name</option>
                    <option>Sort: ID Number</option>
                </select>
            </div>

            <div class="student-list">
                <div class="student-card">
                    <div><strong>Name:</strong> Robin Dela Cruz</div>
                    <div><strong>ID Number:</strong> 12345678</div>
                    <button class="remove-btn">Remove</button>
                </div>

                <div class="student-card">
                    <div><strong>Name:</strong> Carl Crespo</div>
                    <div><strong>ID Number:</strong> 12479144</div>
                    <button class="remove-btn">Remove</button>
                </div>

                <div class="student-card">
                    <div><strong>Name:</strong> Lebron James</div>
                    <div><strong>ID Number:</strong> 66666666</div>
                    <button class="remove-btn">Remove</button>
                </div>
            </div>
        </main>
    </div>
<script src="load-navbar.js"></script>
</body>
</html>
