<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherFind - Manage Account</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/student_manage-account.css">
    <script src="login.js" defer></script>
    <script src="manage-account.js" defer></script>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <!-- ACCOUNT PAGE -->
    <div class="account-wrapper">
        <section class="account-layout">

            <!-- FORM -->
            <div class="account-form">

                <h2>Manage Account</h2>

                <!-- FIRST & LAST NAME -->
                <div class="row two-cols">
                    <div class="form-group">
                        <label>First Name <span class="tag">READ ONLY</span></label>
                        <input type="text" value="John" readonly>
                    </div>

                    <div class="form-group">
                        <label>Last Name <span class="tag">READ ONLY</span></label>
                        <input type="text" value="Doe" readonly>
                    </div>
                </div>

                <!-- EMAIL -->
                <div class="form-group full">
                    <label>Email <span class="tag">READ ONLY</span></label>
                    <input type="email" value="john.doe@dlsu.edu.ph" readonly>
                </div>

                <!-- CURRENT PASSWORD -->
                <div class="form-group full">
                    <label>Current Password</label>
                    <input type="password" id="current-pass" placeholder="Enter current password">

                    <div class="see-pass">
                        <input type="checkbox" onclick="toggleAccountPassword('current-pass')">
                        Show password
                    </div>
                </div>

                <!-- NEW PASSWORD -->
                <div class="form-group full">
                    <label>New Password</label>
                    <input type="password" id="new-pass" placeholder="Enter new password">

                    <div class="see-pass">
                        <input type="checkbox" onclick="toggleAccountPassword('new-pass')">
                        Show password
                    </div>
                </div>

                <!-- BUTTONS -->
                <div class="button-stack">
                    <button id="saveBtn" class="save-btn">
                        Confirm New Password
                    </button>

                    <button id="disableBtn" class="disable-btn">
                        Disable Account
                    </button>
                </div>
            </div>
        </section>
    </div>
    <div id="toast"></div>
<script src="load-navbar.js"></script>
</body>
</html>
